name: Nightly UI

on:
  schedule:
    - cron: '0 7 * * *' # 07:00 UTC daily
  workflow_dispatch:

jobs:
  ui-matrix:
    name: UI tests (${{ matrix.device }})
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        device:
          - 'iPhone 16'
          - 'iPad Pro 13-inch (M4)'
    steps:
      - uses: actions/checkout@v4

      - name: Install tooling
        run: brew install xcodegen xcbeautify || true

      - name: Generate project
        run: xcodegen generate

      - name: Full UI tests
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme WaypointWriter \
            -destination "platform=iOS Simulator,name=${{ matrix.device }}" \
            CODE_SIGNING_ALLOWED=NO | xcbeautify || \
          xcodebuild test \
            -scheme WaypointWriter \
            -destination "platform=iOS Simulator,name=${{ matrix.device }}" \
            CODE_SIGNING_ALLOWED=NO
