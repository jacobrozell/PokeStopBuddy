name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & test (PR scheme)
    runs-on: macos-14
    env:
      SCHEME: PokeStopBuddyCI
      DESTINATION: 'platform=iOS Simulator,name=iPhone 15,OS=17.5'
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Install tooling
        run: |
          brew install xcodegen xcbeautify || true
          # SwiftLint is preinstalled on the macOS runner image; install if missing.
          which swiftlint || brew install swiftlint

      - name: Lint
        run: swiftlint lint --strict --reporter github-actions-logging

      - name: Block tracked secrets
        run: |
          if git ls-files | grep -E 'GoogleService-Info\.plist|Secrets\.plist|\.p8$|\.p12$|\.mobileprovision$'; then
            echo "::error::Tracked secret file detected"; exit 1
          fi

      - name: Generate project
        run: xcodegen generate

      - name: Build & unit/accessibility tests
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO | xcbeautify || \
          xcodebuild test \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
          if-no-files-found: ignore
